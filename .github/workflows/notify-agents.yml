name: Notify Agents

on:
  push:
    tags:
      - 'v*'

env:
  # Update this if the GitHub org is ever renamed
  ORG: agent-hub-org

jobs:
  notify:
    runs-on: ubuntu-latest
    outputs:
      dispatch_time: ${{ steps.record_time.outputs.ts }}

    steps:
      - name: Record dispatch timestamp
        id: record_time
        run: |
          # Shave 30 s to guard against clock skew between runners
          TS=$(date -u -d '30 seconds ago' '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null \
            || date -u -v-30S '+%Y-%m-%dT%H:%M:%SZ')
          echo "ts=$TS" >> $GITHUB_OUTPUT
          echo "Dispatch anchor timestamp: $TS"

      - name: Trigger Agent Syncs
        run: |
          # Agents that use the SDK as a submodule.
          # Marketplace is triggered separately after these agents are live.
          AGENTS=(
            "agent-financials"
            "agent-health"
            "agent-interview-prep"
            "agent-news"
            "agent-research"
          )

          FAILED=()
          for AGENT in "${AGENTS[@]}"; do
            echo "Triggering sync for $AGENT..."
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST \
              -H "Authorization: token ${{ secrets.ORG_PAT }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ env.ORG }}/$AGENT/actions/workflows/sync-sdk.yml/dispatches" \
              -d "{\"ref\":\"main\",\"inputs\":{\"sdk_tag\":\"${GITHUB_REF_NAME}\"}}")

            if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
              echo "  ✓ $AGENT dispatched (HTTP $HTTP_STATUS)"
            else
              echo "  ✗ $AGENT dispatch failed (HTTP $HTTP_STATUS)"
              FAILED+=("$AGENT")
            fi
          done

          if [ ${#FAILED[@]} -gt 0 ]; then
            echo ""
            echo "ERROR: Failed to dispatch sync for: ${FAILED[*]}"
            exit 1
          fi

          echo ""
          echo "All ${#AGENTS[@]} agent(s) notified for SDK tag ${GITHUB_REF_NAME}."

  # One matrix leg per agent — all 5 run in parallel.
  # Each leg waits for that agent's sync-sdk run, then its deploy run.
  wait-agents:
    needs: notify
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false  # let all legs report independently before blocking marketplace
      matrix:
        agent:
          - agent-financials
          - agent-health
          - agent-interview-prep
          - agent-news
          - agent-research

    env:
      GH_TOKEN: ${{ secrets.ORG_PAT }}
      DISPATCH_TS: ${{ needs.notify.outputs.dispatch_time }}
      AGENT: ${{ matrix.agent }}
      POLL_TIMEOUT: 1140  # 19 min — leaves headroom before job timeout-minutes: 25 kills runner

    steps:
      - name: Wait for sync-sdk run to complete
        run: |
          echo "=== Waiting for sync-sdk.yml on $AGENT (since $DISPATCH_TS) ==="

          DEADLINE=$(( $(date +%s) + POLL_TIMEOUT ))
          RUN_ID=""

          while [ -z "$RUN_ID" ]; do
            if [ "$(date +%s)" -gt "$DEADLINE" ]; then
              echo "ERROR: Timed out waiting for sync-sdk run to appear on $AGENT"
              exit 1
            fi
            RUN_ID=$(gh api \
              "repos/${{ env.ORG }}/$AGENT/actions/workflows/sync-sdk.yml/runs?branch=main&created=>=$DISPATCH_TS&per_page=5" \
              --jq '.workflow_runs | sort_by(.created_at) | reverse | .[0].id // empty' \
              2>/dev/null || true)
            if [ -z "$RUN_ID" ]; then
              echo "  No sync run found yet — retrying in 20 s..."
              sleep 20
            fi
          done

          echo "  Found sync run ID: $RUN_ID"

          while true; do
            if [ "$(date +%s)" -gt "$DEADLINE" ]; then
              echo "ERROR: Timed out waiting for sync-sdk run $RUN_ID to finish on $AGENT"
              exit 1
            fi
            STATUS=$(gh api "repos/${{ env.ORG }}/$AGENT/actions/runs/$RUN_ID" \
              --jq '{status: .status, conclusion: .conclusion}' 2>/dev/null || echo '{}')
            RUN_STATUS=$(echo "$STATUS" | jq -r '.status // "unknown"')
            RUN_CONCLUSION=$(echo "$STATUS" | jq -r '.conclusion // "null"')
            echo "  sync run $RUN_ID: status=$RUN_STATUS conclusion=$RUN_CONCLUSION"
            if [ "$RUN_STATUS" = "completed" ]; then
              if [ "$RUN_CONCLUSION" = "success" ]; then
                echo "  ✓ sync-sdk completed for $AGENT"
                break
              else
                echo "ERROR: sync-sdk run $RUN_ID on $AGENT concluded=$RUN_CONCLUSION"
                exit 1
              fi
            fi
            sleep 30
          done

      - name: Wait for deploy run to complete
        run: |
          # Use the original dispatch_time anchor — the deploy run is triggered by the
          # tag push that happens inside the sync run, so it always appears after DISPATCH_TS.
          echo "=== Waiting for deploy.yml on $AGENT (since $DISPATCH_TS) ==="

          DEADLINE=$(( $(date +%s) + POLL_TIMEOUT ))
          RUN_ID=""

          while [ -z "$RUN_ID" ]; do
            if [ "$(date +%s)" -gt "$DEADLINE" ]; then
              echo "ERROR: Timed out waiting for deploy run to appear on $AGENT"
              exit 1
            fi
            # deploy.yml is tag-triggered — no branch filter
            RUN_ID=$(gh api \
              "repos/${{ env.ORG }}/$AGENT/actions/workflows/deploy.yml/runs?created=>=$DISPATCH_TS&per_page=5" \
              --jq '.workflow_runs | sort_by(.created_at) | reverse | .[0].id // empty' \
              2>/dev/null || true)
            if [ -z "$RUN_ID" ]; then
              echo "  No deploy run found yet — retrying in 20 s..."
              sleep 20
            fi
          done

          echo "  Found deploy run ID: $RUN_ID"

          while true; do
            if [ "$(date +%s)" -gt "$DEADLINE" ]; then
              echo "ERROR: Timed out waiting for deploy run $RUN_ID to finish on $AGENT"
              exit 1
            fi
            STATUS=$(gh api "repos/${{ env.ORG }}/$AGENT/actions/runs/$RUN_ID" \
              --jq '{status: .status, conclusion: .conclusion}' 2>/dev/null || echo '{}')
            RUN_STATUS=$(echo "$STATUS" | jq -r '.status // "unknown"')
            RUN_CONCLUSION=$(echo "$STATUS" | jq -r '.conclusion // "null"')
            echo "  deploy run $RUN_ID: status=$RUN_STATUS conclusion=$RUN_CONCLUSION"
            if [ "$RUN_STATUS" = "completed" ]; then
              if [ "$RUN_CONCLUSION" = "success" ]; then
                echo "  ✓ deploy completed for $AGENT"
                break
              else
                echo "ERROR: deploy run $RUN_ID on $AGENT concluded=$RUN_CONCLUSION"
                exit 1
              fi
            fi
            sleep 30
          done

  # Fires only when ALL 5 matrix legs succeed (default if: success() semantics)
  notify-marketplace:
    needs: wait-agents
    runs-on: ubuntu-latest

    steps:
      - name: Dispatch sync-sdk on agent-marketplace
        run: |
          echo "All 5 agents synced and deployed — triggering marketplace for ${GITHUB_REF_NAME}..."

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: token ${{ secrets.ORG_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ env.ORG }}/agent-marketplace/actions/workflows/sync-sdk.yml/dispatches" \
            -d "{\"ref\":\"main\",\"inputs\":{\"sdk_tag\":\"${GITHUB_REF_NAME}\"}}")

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "✓ agent-marketplace sync-sdk.yml dispatched (HTTP $HTTP_STATUS)"
          else
            echo "ERROR: Failed to dispatch to agent-marketplace (HTTP $HTTP_STATUS)"
            exit 1
          fi
