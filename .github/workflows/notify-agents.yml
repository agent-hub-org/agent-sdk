name: Notify Agents

on:
  push:
    tags:
      - 'v*'

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Agent Syncs
        run: |
          # List of agents that use the SDK as a submodule
          # (Excludes marketplace as it does not use a submodule)
          AGENTS=("agent-financials" "agent-health" "agent-interview-prep" "agent-news" "agent-research")
          
          for AGENT in "${AGENTS[@]}"; do
            echo "Triggering sync for $AGENT..."
            curl -f -s -S -X POST \
              -H "Authorization: token ${{ secrets.ORG_PAT }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/agent-hub-org/$AGENT/actions/workflows/sync-sdk.yml/dispatches" \
              -d '{"ref":"main","inputs":{"sdk_tag":"'"${GITHUB_REF_NAME}"'"}}'
          done
